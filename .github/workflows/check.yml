name: Check

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run basedpyright
        run: uv run basedpyright

      - name: Run pytest
        run: uv run pytest -q
